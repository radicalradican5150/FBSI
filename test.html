<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBSI Sandwich Compatibility Test</title>
    <style>
        body {
            background-color: #e8e8e8;
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        .container {
            background: white;
            width: 800px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }
        h1 {
            text-align: center;
            color: #2e7d32;
        }
        .question {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
        }
        .answers {
            margin-top: 10px;
        }
        .answers label {
            display: block;
            margin: 6px 0;
            font-size: 18px;
        }
        button {
            margin-top: 30px;
            padding: 15px;
            width: 100%;
            font-size: 20px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FBSI Sandwich Compatibility Test (SCT‑20)</h1>

    <form id="sandwichForm">

        <div id="questions"></div>

        <button type="button" onclick="finishTest()">Submit Test</button>
    </form>
</div>

<script>
    // Sandwich types
    const types = ["Standard-Sandwich", "FullyLoaded", "OpenFace", "Sleek-Sub", "Super-Sandwich"];

    // Real human answers for each question
    const answers = [
        ["A light snack", "A normal meal", "Something efficient and filling", "A big hearty sandwich", "A massive, energy-packed meal"],
        ["One slice, open style", "Classic white or wheat", "A long sub roll", "Thick artisan bread", "Reinforced double-layer bread"],
        ["Very neat", "Mildly messy", "Slightly messy but controlled", "Messy but worth it", "Total chaos"],
        ["Light recon", "Standard patrol", "Stealth infiltration", "Heavy support", "Full assault"],
        ["None", "One slice", "Thin layer", "Double cheese", "Triple cheese"],
        ["Slow and relaxed", "Normal pace", "Efficient", "Fast", "Tactical inhalation"],
        ["Light spread", "Standard amount", "Oil & vinegar", "Heavy sauce", "Classified special sauce"],
        ["Light", "Medium", "Streamlined", "Heavy", "Maximum payload"],
        ["Minimal", "Normal", "Lean slices", "Double meat", "Triple meat"],
        ["Cool", "Room temp", "Slightly chilled", "Warm", "Hot"],
        ["Not very", "Somewhat", "Depends", "Very", "Extreme"],
        ["Slow", "Normal", "Fast", "Heavy but powerful", "Maximum velocity"],
        ["Short", "Medium", "Long", "Extended", "Overnight"],
        ["None", "Light", "Crisp", "Heavy", "Reinforced"],
        ["Low", "Normal", "Moderate", "High", "Maximum"],
        ["Simple", "Classic", "Sleek", "Loaded", "Overpowered"],
        ["Easy", "Standard", "Technical", "Complex", "Extreme"],
        ["Low", "Medium", "High", "Loud", "Impossible to hide"],
        ["Small", "Normal", "Good", "Big", "Legendary"],
        ["None", "Mild", "Tactical", "Noticeable", "Terrifying"]
    ];

    // Randomized-but-fixed mapping
    const mapping = [];

    function shuffle(array) {
        let arr = array.slice();
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Create a fixed randomized mapping for each question
    for (let i = 0; i < answers.length; i++) {
        mapping.push(shuffle(types));
    }

    // Render questions
    const qDiv = document.getElementById("questions");

    answers.forEach((ansList, index) => {
        const qBlock = document.createElement("div");
        qBlock.innerHTML = `
            <div class="question">${index + 1}. ${questionsText(index)}</div>
            <div class="answers">
                ${ansList.map((ans, i) => `
                    <label>
                        <input type="radio" name="q${index}" value="${mapping[index][i]}" required>
                        ${ans}
                    </label>
                `).join("")}
            </div>
        `;
        qDiv.appendChild(qBlock);
    });

    // Question text function
    function questionsText(i) {
        const q = [
            "How hungry are you right now?",
            "What kind of bread do you prefer?",
            "How messy can your sandwich be?",
            "What mission are you preparing for?",
            "How much cheese do you want?",
            "How fast do you usually eat?",
            "Pick your condiment style.",
            "What weight should your sandwich be?",
            "How much meat do you want?",
            "Preferred sandwich temperature?",
            "How adventurous are you with food?",
            "Sandwich speed rating?",
            "Mission duration?",
            "Lettuce level?",
            "Energy requirement?",
            "Sandwich vibe?",
            "Difficulty rating?",
            "Stealth rating?",
            "Morale boost?",
            "Intimidation level?"
        ];
        return q[i];
    }

    function finishTest() {
        const form = document.getElementById("sandwichForm");
        const data = new FormData(form);

        let scores = {
            "Standard-Sandwich": 0,
            "FullyLoaded": 0,
            "OpenFace": 0,
            "Sleek-Sub": 0,
            "Super-Sandwich": 0
        };

        for (let value of data.values()) {
            scores[value]++;
        }

        let best = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

        localStorage.setItem("fbsi_sandwich", best);

        location.href = "sandwich.html";
    }
</script>

</body>
</html>
