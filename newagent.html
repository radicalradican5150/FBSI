<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBSI New User Registration</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
        .container {
            background: white;
            width: 450px;
            margin: auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 10px;
            color: #333;
        }
        p {
            color: #555;
            margin-bottom: 20px;
        }
        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #aaa;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            font-size: 16px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>New Sandwich Maker Registration</h1>
    <p>Please enter your information to create your FBSI account.</p>

    <label>Full Name</label>
    <input type="text" placeholder="Enter Full Name">

    <label>Desired Username</label>
    <input type="text" placeholder="Choose a Username">

    <label>Create Badge Number</label>
    <input type="text" placeholder="Enter Badge Number">

    <button onclick="location.href='registered.html'">Create Account</button>
</div>

</body>
</html>
