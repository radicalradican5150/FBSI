<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBSI Dashboard</title>
    <style>
        body {
            background-color: #e8e8e8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }
        .container {
            background: white;
            width: 650px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .info-box, .updates-box {
            background: #f7f7f7;
            padding: 20px;
            margin-top: 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .value {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .update-item {
            margin-bottom: 12px;
            font-size: 16px;
        }
        .btn {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            font-size: 16px;
            color: #1565c0;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FBSI Agent Dashboard</h1>
    <p>Welcome back, Agent. Your operational data is displayed below.</p>

    <!-- Agent Info -->
    <div class="info-box">
        <div class="label">Agent Username:</div>
        <div class="value" id="displayUser"></div>

        <div class="label">Badge Number:</div>
        <div class="value" id="displayBadge"></div>
    </div>

    <!-- Updates Section -->
    <div class="updates-box">
