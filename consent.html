<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBSI Login Confirmation</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 120px;
        }
        .box {
            background: white;
            width: 450px;
            margin: auto;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Login Successful</h1>
    <p>You have successfully logged into the FBSI system.</p>
    <button onclick="location.href='dashboard.html'">Continue</button>
</div>

</body>
</html>
