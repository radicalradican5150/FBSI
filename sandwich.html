<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Sandwich - FBSI</title>
    <style>
        body {
            background-color: #e8e8e8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        .container {
            background: white;
            width: 650px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .info-box, .sandwich-box {
            background: #f7f7f7;
            padding: 20px;
            margin-top: 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .value {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .btn {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 25px;
            font-size: 16px;
            color: #1565c0;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Your Assigned Sandwich</h1>
    <p>Welcome, Agent. Below is your official FBSI‑issued sandwich profile.</p>

    <div class="info-box">
        <div class="label">Username:</div>
        <div class="value" id="displayUser"></div>

        <div class="label">Badge Number:</div>
        <div class="value" id="displayBadge"></div>
    </div>

    <!-- Sandwich area -->
    <div id="sandwichArea"></div>

    <a href="dashboard.html">Return to Dashboard</a>
</div>

<script>
    // Pull saved credentials
    const user = localStorage.getItem("fbsi_username");
    const badge = localStorage.getItem("fbsi_badge");

    document.getElementById("displayUser").innerText = user;
    document.getElementById("displayBadge").innerText = badge;

    // Sandwich logic
    const sandwichArea = document.getElementById("sandwichArea");
    let sandwich = localStorage.getItem("fbsi_sandwich");

    const sandwichOptions = [
        {
            type: "SIS‑01 Standard Issue Sandwich",
            ingredients: "Bread, Meat (classified), Cheese, Lettuce, Regulated Condiments",
            status: "85% Ready"
        },
        {
            type: "SIS‑02 Tactical Sub",
            ingredients: "Sub Roll, Turkey, Swiss, Tactical Lettuce, Black Ops Mayo",
            status: "92% Ready"
        },
        {
            type: "SIS‑03 Covert PB&J",
            ingredients: "White Bread, Peanut Butter, Classified Jelly",
            status: "76% Ready"
        },
        {
            type: "SIS‑04 High‑Security Hoagie",
            ingredients: "Hoagie Roll, Salami, Provolone, Onion, Secure Mustard",
            status: "98% Ready"
        }
    ];

    function displaySandwich(data) {
        sandwichArea.innerHTML = `
            <div class="sandwich-box">
                <div class="label">Sandwich Type:</div>
                <div class="value">${data.type}</div>

                <div class="label">Ingredients:</div>
                <div class="value">${data.ingredients}</div>

                <div class="label">Status:</div>
                <div class="value">${data.status}</div>
            </div>
        `;
    }

    function determineSandwich() {
        const random = sandwichOptions[Math.floor(Math.random() * sandwichOptions.length)];
        localStorage.setItem("fbsi_sandwich", JSON.stringify(random));
        displaySandwich(random);
    }

    // If sandwich exists, show it. If not, show button.
    if (sandwich) {
        displaySandwich(JSON.parse(sandwich));
    } else {
        sandwichArea.innerHTML = `
            <button class="btn" onclick="determineSandwich()">Determine Your Sandwich</button>
        `;
    }
</script>

</body>
</html>
