<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Sandwich - FBSI</title>
    <style>
        body {
            background-color: #e8e8e8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        .container {
            background: white;
            width: 650px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .info-box, .sandwich-box {
            background: #f7f7f7;
            padding: 20px;
            margin-top: 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .value {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .btn {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            font-size: 16px;
            color: #1565c0;
            text-decoration: none;
        }
        .retake {
            margin-top: 25px;
            font-size: 15px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Your Assigned Sandwich</h1>
    <p>Welcome, Agent. Below is your official FBSI‑issued sandwich profile.</p>

    <div class="info-box">
        <div class="label">Username:</div>
        <div class="value" id="displayUser"></div>

        <div class="label">Badge Number:</div>
        <div class="value" id="displayBadge"></div>
    </div>

    <div id="sandwichArea"></div>

    <div class="retake">
        <a href="#" onclick="retakeTest()">Retake Sandwich Test</a>
    </div>

    <a href="dashboard.html">Return to Dashboard</a>
</div>

<script>
    const user = localStorage.getItem("fbsi_username");
    const badge = localStorage.getItem("fbsi_badge");

    document.getElementById("displayUser").innerText = user;
    document.getElementById("displayBadge").innerText = badge;

    const sandwichArea = document.getElementById("sandwichArea");
    let sandwich = localStorage.getItem("fbsi_sandwich");

    const sandwichData = {
        "Standard-Sandwich": {
            ingredients: "Bread, Meat, Cheese, Lettuce, Mayo",
            status: "Ready for basic field operations"
        },
        "FullyLoaded": {
            ingredients: "Bread, Ham, Turkey, Roast Beef, Cheese, Lettuce, Tomato, Onion, Sauce",
            status: "High-calorie mission support"
        },
        "OpenFace": {
            ingredients: "Single Slice Bread, Meat, Sauce, Garnish",
            status: "Light-duty operational sandwich"
        },
        "Sleek-Sub": {
            ingredients: "Sub Roll, Turkey, Swiss, Lettuce, Oil & Vinegar",
            status: "Optimized for stealth missions"
        },
        "Super-Sandwich": {
            ingredients: "Bread, Double Meat, Double Cheese, Special Sauce, Reinforced Lettuce",
            status: "Maximum performance sandwich"
        }
    };

    if (sandwich) {
        const data = sandwichData[sandwich];
        sandwichArea.innerHTML = `
            <div class="sandwich-box">
                <div class="label">Sandwich Type:</div>
                <div class="value">${sandwich}</div>

                <div class="label">Ingredients:</div>
                <div class="value">${data.ingredients}</div>

                <div class="label">Status:</div>
                <div class="value">${data.status}</div>
            </div>
        `;
    } else {
        sandwichArea.innerHTML = `
            <button class="btn" onclick="location.href='test.html'">Determine Your Sandwich</button>
        `;
    }

    function retakeTest() {
        localStorage.removeItem("fbsi_sandwich");
        location.href = "test.html";
    }
</script>

</body>
</html>
