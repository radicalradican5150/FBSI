<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Profile - FBSI</title>
    <style>
        body {
            background-color: #e8e8e8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }
        .container {
            background: white;
            width: 750px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .section {
            background: #f7f7f7;
            padding: 20px;
            margin-top: 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .value {
            font-size: 18px;
            margin-bottom: 15px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            font-size: 16px;
            color: #1565c0;
            text-decoration: none;
        }
        .btn {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Agent Profile</h1>
    <p>Your official FBSI dossier is displayed below.</p>

    <!-- Agent Info -->
    <div class="section">
        <div class="label">Agent Username:</div>
        <div class="value" id="displayUser"></div>

        <div class="label">Badge Number:</div>
        <div class="value" id="displayBadge"></div>
    </div>

    <!-- Sandwich Info -->
    <div class="section" id="sandwichSection"></div>

    <!-- Security Info -->
    <div class="section" id="securitySection"></div>

    <a href="dashboard.html">Return to Dashboard</a>
</div>

<script>
    // Load user info
    const user = localStorage.getItem("fbsi_username");
    const badge = localStorage.getItem("fbsi_badge");

    document.getElementById("displayUser").innerText = user;
    document.getElementById("displayBadge").innerText = badge;

    // Sandwich info
    const sandwich = localStorage.getItem("fbsi_sandwich");
    const sandwichSection = document.getElementById("sandwichSection");

    const sandwichData = {
        "Standard-Sandwich": {
            ingredients: "Bread, Meat, Cheese, Lettuce, Mayo",
            status: "Ready for basic field operations"
        },
        "FullyLoaded": {
            ingredients: "Bread, Ham, Turkey, Roast Beef, Cheese, Lettuce, Tomato, Onion, Sauce",
            status: "High-calorie mission support"
        },
        "OpenFace": {
            ingredients: "Single Slice Bread, Meat, Sauce, Garnish",
            status: "Light-duty operational sandwich"
        },
        "Sleek-Sub": {
            ingredients: "Sub Roll, Turkey, Swiss, Lettuce, Oil & Vinegar",
            status: "Optimized for stealth missions"
        },
        "Super-Sandwich": {
            ingredients: "Bread, Double Meat, Double Cheese, Special Sauce, Reinforced Lettuce",
            status: "Maximum performance sandwich"
        }
    };

    if (sandwich) {
        const data = sandwichData[sandwich];
        sandwichSection.innerHTML = `
            <div class="label">Assigned Sandwich:</div>
            <div class="value">${sandwich}</div>

            <div class="label">Ingredients:</div>
            <div class="value">${data.ingredients}</div>

            <div class="label">Status:</div>
            <div class="value">${data.status}</div>

            <a href="sandwich.html">Retake Sandwich Test</a>
        `;
    } else {
        sandwichSection.innerHTML = `
            <div class="label">Assigned Sandwich:</div>
            <div class="value">None Assigned</div>
            <button class="btn" onclick="location.href='test.html'">Determine Sandwich</button>
        `;
    }

    // Security info
    const security = localStorage.getItem("fbsi_security");
    const securitySection = document.getElementById("securitySection");

    const securityData = {
        "Sandwich Handler": {
            desc: "Basic clearance. Trusted with low‑risk sandwich operations."
        },
        "Bread Technician": {
            desc: "Intermediate clearance. Authorized to handle bread‑related intel."
        },
        "Condiment Specialist": {
            desc: "Advanced clearance. Controls classified sauce distribution."
        },
        "Tactical Sub Operator": {
            desc: "High clearance. Executes stealth sub‑based missions."
        },
        "Ultra-Secure Sandwich Commander": {
            desc: "Maximum clearance. Full access to all FBSI sandwich intelligence."
        }
    };

    if (security) {
        const data = securityData[security];
        securitySection.innerHTML = `
            <div class="label">Security Level:</div>
            <div class="value">${security}</div>

            <div class="label">Description:</div>
            <div class="value">${data.desc}</div>

            <a href="security.html">Retake Security Test</a>
        `;
    } else {
        securitySection.innerHTML = `
            <div class="label">Security Level:</div>
            <div class="value">None Assigned</div>
            <button class="btn" onclick="location.href='securitytest.html'">Determine Security Level</button>
        `;
    }
</script>

</body>
</html>
